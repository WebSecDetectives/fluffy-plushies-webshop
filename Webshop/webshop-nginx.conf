server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow image uploads through the proxy (nginx default is 1m); Spring enforces 2MB.
    client_max_body_size 3m;

    # SPA fallback: unknown paths are Angular routes, serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API paths -> backend services on the Docker network.
    # Path is preserved (no URI on proxy_pass), matching the services' context paths.
    location /identity/ {
        proxy_pass http://identity-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /inventory/ {
        proxy_pass http://inventory-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
