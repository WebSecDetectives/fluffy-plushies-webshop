<div>
  <br><br><br><br>
  <h1 class="d-flex d-flex-center">Login</h1>
  <br><br>
  <div class="d-flex d-flex-justify-center d-flex-align-top">
    <form [formGroup]="loginForm" (submit)="onSubmit($event)">
      <p>Username</p>
      <input type="text" class="input-field" formControlName="username" placeholder="username">
      <p>Password</p>
      <input type="password" class="input-field" formControlName="password" placeholder="password">

      @if (errorMessage(); as message) {
        <p class="error-message">{{ message }}</p>
      }

      <br><br>
      <input type="submit" class="login-button-anchor" style="border: none; color: white;"
             value="Login" [disabled]="submitting()">
    </form>
  </div>
</div>
